services:
  server:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules_server:/app/node_modules
      - pnpm_store_server:/pnpm-store
    command: sh -c "corepack enable && pnpm config set store-dir /pnpm-store && pnpm install && PORT=3000 pnpm -C packages/server dev"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - CI=true
    ports:
      - "3000:3000"

  client:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules_client:/app/node_modules
      - pnpm_store_client:/pnpm-store
    command: sh -c "corepack enable && pnpm config set store-dir /pnpm-store && pnpm install && pnpm -C packages/client dev -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development
      - CI=true
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  node_modules_server:
  pnpm_store_server:
  node_modules_client:
  pnpm_store_client:
