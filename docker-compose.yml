services:
  server:
    environment:
      # - VITE_API_URL=http://13.239.22.119:3000/api
      - VITE_API_URL=http://localhost:3000/api
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "3000:3000"

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server
